<div id="login" aria-hidden="true" class="popup">
	<div class="popup__wrapper">
		<div class="popup__content">
			<button data-close type="button" class="popup__close">Закрыть</button>
			<div class="popup__text header-popup">
				<h1 class="header-popup__title">ЛИЧНЫЙ КАБИНЕТ</h1>
				<p class="header-popup__subtitle">ВВедите пожалуйста свой логин и пароль</p>
				<form action="#" class="header-popup__form form-popup">
					<div class="form-popup__email email">
						<button type="submit" class="email__button _icon-user"></button>
						<input autocomplete="off" type="text" name="form[]" data-error="Ошибка" placeholder="email@example.com" class="email__input">
					</div>
					<div class="form-popup__password password">
						<button type="submit" class="password__button _icon-lock"></button>
						<input autocomplete="off" type="text" name="form[]" data-error="Ошибка" placeholder="••••••••" class="password__input">
					</div>
				</form>
				<div class="header-popup__service service-popup">
					<div class="service-popup__checkbox checkbox">
						<input id="c_1" data-error="Ошибка" class="checkbox__input" type="checkbox" value="1" name="form[]">
						<label for="c_1" class="checkbox__label"><span class="checkbox__text">ЗАПОМНИТЕ МЕНЯ</span></label>
					</div>
					<a href="" class="service-popup__link">Я ЗАБЫЛ ПАРОЛЬ!</a>
				</div>
				<button type="submit" class="header-popup__btn button _fw">ВОЙТИ</button>
			</div>
		</div>
	</div>
</div>
